<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sistem Absensi Analytics LIVE GOOGLE SHEETS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<style>
:root { --bg: #0d0f14; --surface: #161a23; --surface2: #1e2330; --border: #2a3045; --accent: #4fffb0; --accent4: #74b9ff; --text: #e8eaf0; --muted: #6b7490; --danger: #ff7675; --warning: #ffeaa7; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; padding: 24px 16px; }
.header { text-align: center; margin-bottom: 24px; }
.header h1 { font-size: 2.2rem; background: linear-gradient(135deg,var(--accent),var(--accent4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

.control-panel, .management-panel { background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
.management-panel { border-color: var(--accent4); background: linear-gradient(180deg, var(--surface) 0%, rgba(116,185,255,0.03) 100%); }
.control-group { display: flex; flex-direction: column; gap: 5px; }
.control-group label { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
.control-input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px 14px; border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 0.85rem; outline: none; min-width: 140px; }
.control-input:focus { border-color: var(--accent); }
.status-badge { background: rgba(79,255,176,0.1); color: var(--accent); padding: 8px 14px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.8rem; margin-left: auto; align-self: center; }

.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
.btn:hover { border-color: var(--accent); background: rgba(79,255,176,0.05); }
.btn-primary { border-color: var(--accent4); color: var(--accent4); }
.btn-primary:hover { background: rgba(116,185,255,0.1); }
.btn-excel:hover { border-color: #2ecc71; color: #2ecc71; }
.btn-pdf:hover { border-color: #e74c3c; color: #e74c3c; }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(255,118,117,0.1); }
.btn-reset-mini { padding: 4px 8px; font-size: 0.75rem; border-radius: 4px; background: rgba(255,118,117,0.1); border: 1px solid var(--danger); color: var(--danger); cursor: pointer; }
.btn-reset-mini:hover { background: var(--danger); color: #fff; }

.price-box { border-left: 2px solid var(--border); padding-left: 20px; display: flex; flex-wrap: wrap; gap: 12px; }

.dashboard-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
@media (max-width: 1100px) { .dashboard-layout { grid-template-columns: 1fr; .price-box { border-left: none; padding-left: 0; } } }
.member-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px; padding: 15px; }
.member-top { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; color: #fff; }
.member-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; font-family: 'DM Mono', monospace; }

.days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; }
.day-box { background: var(--surface2); padding: 8px; border-radius: 8px; font-size: 0.75rem; border: 1px solid rgba(42,48,69,0.5); }
.day-name { color: var(--accent4); font-weight: bold; margin-bottom: 4px; }
.summary-table { width: 100%; border-collapse: collapse; margin-top: 24px; background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.summary-table th, .summary-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.summary-table th { background: var(--surface2); color: var(--muted); font-weight: 600; }
.chart-section { background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-top: 24px; height: 320px; }

.sidebar-panel { background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border); height: fit-content; }
.sidebar-title { font-size: 1rem; font-weight: 700; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; color: var(--accent4); }
.team-list { display: flex; flex-direction: column; gap: 10px; font-size: 0.85rem; }
.team-item { background: var(--surface2); padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(42,48,69,0.3); display: flex; flex-direction: column; gap: 4px; }

/* Warna Badge Jabatan EMS */
.rank-head { background: rgba(255,118,117,0.15); color: #ff7675; border: 1px solid #ff7675; }
.rank-deputy { background: rgba(255,168,1,0.15); color: #ffa801; border: 1px solid #ffa801; }
.rank-dokter { background: rgba(116,185,255,0.15); color: #74b9ff; border: 1px solid #74b9ff; }
.rank-paramedic { background: rgba(162,155,254,0.15); color: #a29bfe; border: 1px solid #a29bfe; }
.rank-emt { background: rgba(85,239,196,0.15); color: #55efc4; border: 1px solid #55efc4; }
.rank-default { background: rgba(107,116,144,0.15); color: #6b7490; border: 1px solid #6b7490; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Dashboard Absensi Cloud Valoria</h1>
  <p style="color: var(--muted); font-size: 0.85rem; margin-top: 5px; font-family: 'DM Mono', monospace;">REKAP, RESET & MANAGEMENT STRUKTUR CLOUD SYSTEM</p>
</div>

<div class="management-panel">
  <div class="control-group">
    <label style="color: var(--accent4);">🛠️ INPUT NAMA ANGGOTA:</label>
    <input type="text" id="newMemberName" class="control-input" placeholder="Nama Lengkap...">
  </div>
  <div class="control-group">
    <label style="color: var(--accent4);">📋 PILIH JABATAN PANGKAT:</label>
    <select id="selectRank" class="control-input" onchange="toggleCustomRankInput()">
      <option value="Head Of Ems">Head Of Ems</option>
      <option value="Deputy Of Ems">Deputy Of Ems</option>
      <option value="Dokter Spesialis">Dokter Spesialis</option>
      <option value="Paramedic">Paramedic</option>
      <option value="Emt">Emt</option>
      <option value="KUSTOM">-- Tulis Jabatan Kustom --</option>
    </select>
  </div>
  <div class="control-group" id="customRankGroup" style="display: none;">
    <label style="color: var(--danger);">✍️ NAMA JABATAN KUSTOM:</label>
    <input type="text" id="customRankName" class="control-input" placeholder="Ketik pangkat baru...">
  </div>
  <div class="control-group">
    <button class="btn btn-primary" id="btnSaveMember" onclick="addMemberToCloud()">➕ Simpan Ke Cloud</button>
  </div>
</div>

<div class="control-panel">
  <div class="control-group">
    <label>PILIH MINGGU REKAP:</label>
    <input type="date" id="weekStart" class="control-input" style="font-family: 'DM Mono', monospace;" onchange="processAndRender()">
  </div>
  
  <div class="control-group">
    <label>CARI NAMA ANGGOTA:</label>
    <input type="text" id="searchName" class="control-input" placeholder="Ketik nama tim..." oninput="processAndRender()">
  </div>

  <div class="price-box">
    <div class="control-group">
      <label>💰 TREATMENT ($):</label>
      <input type="number" id="priceTreatment" class="control-input" value="35" style="width: 75px; min-width: 75px; font-family: 'DM Mono';" oninput="processAndRender()">
    </div>
    <div class="control-group">
      <label>💰 PINGSAN ($):</label>
      <input type="number" id="pricePingsan" class="control-input" value="45" style="width: 75px; min-width: 75px; font-family: 'DM Mono';" oninput="processAndRender()">
    </div>
    <div class="control-group">
      <label>💊 ALPRAZOLAM ($):</label>
      <input type="number" id="priceAlprazolam" class="control-input" value="50" style="width: 75px; min-width: 75px; font-family: 'DM Mono';" oninput="processAndRender()">
    </div>
  </div>

  <div class="control-group" style="margin-left: 5px;">
    <div class="btn-group">
      <button class="btn btn-excel" onclick="exportToExcel()">📊 Excel</button>
      <button class="btn btn-pdf" onclick="exportToPDF()">📑 PDF</button>
      <button class="btn btn-danger" id="btnResetAll" onclick="resetAllDataFromCloud()">⚠️ Reset Semua</button>
    </div>
  </div>

  <div class="status-badge" id="syncStatus">🔄 Menghubungkan...</div>
</div>

<div class="dashboard-layout">
  <div>
    <div id="membersContainer"></div>

    <table class="summary-table" id="reportTable">
      <thead>
        <tr><th>Nama Anggota</th><th>Total Jam</th><th>Treatment</th><th>Pingsan</th><th>Alprazolam</th><th>Total Income</th><th>Aksi</th></tr>
      </thead>
      <tbody id="summaryBody"></tbody>
    </table>

    <div class="chart-section"><canvas id="analyticsChart"></canvas></div>
  </div>

  <div class="sidebar-panel">
    <div class="sidebar-title">📋 Struktur Organisasi EMS Resmi</div>
    <div id="teamListContainer" class="team-list">
      <div style="color:var(--muted); font-size:0.8rem; text-align:center;">Memuat struktur jabatan...</div>
    </div>
  </div>
</div>

<script>
// --- ✅ JEMBATAN LIVE CLOUD SAKTI ASLI PUNYA ZHAGI ---
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyvM5hPjWdxvldqQofNSQ_2tUf8qLrkeDOCfaUbUx036edUvgoEE7XnoQ6PPG5xCm2-Tg/exec';

const CSV_ABSEN_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdcWhromy0EiLziCHqBFVXGEerb4FFwdOy2pq7LPus9z5fet0tHJFzmC_xvWxh96MzRIPOWWtJa3Jm/pub?gid=0&single=true&output=csv';
const CSV_ANGGOTA_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdcWhromy0EiLziCHqBFVXGEerb4FFwdOy2pq7LPus9z5fet0tHJFzmC_xvWxh96MzRIPOWWtJa3Jm/pub?gid=422470466&single=true&output=csv';

let rawAbsenData = [];
let rawAnggotaData = [];
let lastFetchedAbsenRaw = "";    
let lastFetchedAnggotaRaw = "";  
let mainChart = null;
let userRanks = {};

window.addEventListener('load', () => {
  const sun = new Date(); sun.setDate(sun.getDate() - sun.getDay());
  document.getElementById('weekStart').value = sun.toISOString().split('T')[0];
  fetchGoogleSheetsData(true); 
  setInterval(() => fetchGoogleSheetsData(false), 15000); // Auto sync mulus tiap 15 detik
});

function toggleCustomRankInput() {
  document.getElementById('customRankGroup').style.display = (document.getElementById('selectRank').value === 'KUSTOM') ? 'flex' : 'none';
}

// ☁️ CLOUD ACTION 1: SIMPAN/UPDATE JABATAN BARU
function addMemberToCloud() {
  const nama = document.getElementById('newMemberName').value.trim();
  const selectVal = document.getElementById('selectRank').value;
  const jabatan = (selectVal === 'KUSTOM') ? document.getElementById('customRankName').value.trim() : selectVal;
  
  if(!nama || !jabatan) return alert('Nama dan Jabatan wajib diisi!');
  document.getElementById('btnSaveMember').innerText = "⏳ Menyimpan...";
  
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'add_member', nama: nama, jabatan: jabatan })
  }).then(() => {
    alert(`Sukses dikirim! ${nama} resmi menjabat sebagai ${jabatan} di cloud.`);
    document.getElementById('newMemberName').value = '';
    document.getElementById('customRankName').value = '';
    document.getElementById('btnSaveMember').innerText = "➕ Simpan Ke Cloud";
    fetchGoogleSheetsData(true);
  }).catch(e => alert('Gagal memproses ke server cloud: ' + e));
}

// ☁️ CLOUD ACTION 2: RESET PER ORANG DI MINGGU TERPILIH
function resetPerPersonFromCloud(name) {
  const week = document.getElementById('weekStart').value;
  if(!confirm(`Hapus permanen seluruh data baris absen ${name} pada minggu ${week} langsung di Google Sheets?`)) return;
  
  document.getElementById('syncStatus').innerText = "⏳ Menghapus Baris Cloud...";
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'reset_person', nama: name, week: week })
  }).then(() => {
    alert(`Data absen ${name} pada minggu kontrak ini sukses dibersihkan dari server.`);
    fetchGoogleSheetsData(true);
  });
}

// ☁️ CLOUD ACTION 3: RESET MASSAL TOTAL SATU MINGGU PENUH
function resetAllDataFromCloud() {
  const week = document.getElementById('weekStart').value;
  if(!confirm(`⚠️ WARNING SEGERA!\nApakah lo yakin ingin MENGHAPUS TOTAL seluruh baris data absen minggu ${week} langsung dari server Google Sheets?`)) return;
  
  document.getElementById('btnResetAll').innerText = "⏳ Wiping cloud...";
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'reset_all', week: week })
  }).then(() => {
    alert(`Wipe out total sukses! Semua log absen minggu ${week} telah lenyap.`);
    document.getElementById('btnResetAll').innerText = "⚠️ Reset Semua";
    fetchGoogleSheetsData(true);
  });
}

function fetchGoogleSheetsData(forceRender = false) {
  Promise.all([
    fetch(CSV_ABSEN_URL + '&cachebust=' + Date.now()).then(res => res.text()), 
    fetch(CSV_ANGGOTA_URL + '&cachebust=' + Date.now()).then(res => res.text())
  ])
  .then(([csvAbsen, csvAnggota]) => {
    if (!forceRender && csvAbsen === lastFetchedAbsenRaw && csvAnggota === lastFetchedAnggotaRaw) {
      return; 
    }
    
    lastFetchedAbsenRaw = csvAbsen;
    lastFetchedAnggotaRaw = csvAnggota;

    rawAbsenData = parseCSV(csvAbsen);
    rawAnggotaData = parseCSV(csvAnggota);
    
    userRanks = {};
    rawAnggotaData.forEach(row => {
      if(row['Nama Anggota']) {
        userRanks[row['Nama Anggota']] = row['Jabatan'] || 'Emt';
      }
    });

    renderTeamList(rawAnggotaData);
    processAndRender();
    
    document.getElementById('syncStatus').innerText = "🟢 Terhubung ke Google Cloud";
    document.getElementById('syncStatus').style.color = "var(--accent)";
  })
  .catch(err => {
    console.error("Eror sinkronisasi data:", err);
    document.getElementById('syncStatus').innerText = "🔴 Sinkronisasi Terputus";
    document.getElementById('syncStatus').style.color = "var(--danger)";
  });
}

function parseCSV(text) {
  const lines = text.split('\n').map(line => line.split(','));
  const headers = lines[0].map(h => h.trim().replace(/"/g, ''));
  const result = [];
  
  for(let i=1; i<lines.length; i++) {
    if(!lines[i] || lines[i].length < headers.length) continue;
    const obj = {};
    headers.forEach((header, index) => {
      obj[header] = lines[i][index] ? lines[i][index].trim().replace(/"/g, '') : '';
    });
    if(Object.values(obj).some(v => v !== '')) result.push(obj);
  }
  return result;
}

function getRankClass(rank) {
  if(!rank) return 'rank-default';
  const r = rank.toLowerCase();
  if(r.includes('head')) return 'rank-head';
  if(r.includes('deputy')) return 'rank-deputy';
  if(r.includes('spesialis') || r.includes('dokter')) return 'rank-dokter';
  if(r.includes('paramedic')) return 'rank-paramedic';
  if(r.includes('emt')) return 'rank-emt';
  return 'rank-default';
}

function renderTeamList(anggotaList) {
  const container = document.getElementById('teamListContainer');
  container.innerHTML = '';
  if(anggotaList.length === 0) {
    container.innerHTML = '<div style="color:var(--muted); font-size:0.8rem;">Belum ada anggota resmi terdaftar.</div>';
    return;
  }
  
  const hirarkiOrder = ['head of ems', 'deputy of ems', 'dokter spesialis', 'paramedic', 'emt'];
  
  let sortedList = [...anggotaList].sort((a, b) => {
    let rA = (a['Jabatan'] || 'Emt').toLowerCase();
    let rB = (b['Jabatan'] || 'Emt').toLowerCase();
    let idxA = hirarkiOrder.indexOf(rA);
    let idxB = hirarkiOrder.indexOf(rB);
    return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
  });

  sortedList.forEach((member) => {
    if(!member['Nama Anggota']) return;
    const rank = member['Jabatan'] || 'Emt';
    const rankClass = getRankClass(rank);
    container.innerHTML += `
      <div class="team-item">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong>${member['Nama Anggota']}</strong>
          <span class="member-badge ${rankClass}" style="font-size:0.65rem;">${rank}</span>
        </div>
      </div>`;
  });
}

function processAndRender() {
  const selectedWeek = document.getElementById('weekStart').value;
  const searchQuery = document.getElementById('searchName').value.toLowerCase().trim();
  
  const rateTreatment = parseFloat(document.getElementById('priceTreatment').value) || 0;
  const ratePingsan = parseFloat(document.getElementById('pricePingsan').value) || 0;
  const rateAlprazolam = parseFloat(document.getElementById('priceAlprazolam').value) || 0;
  
  const container = document.getElementById('membersContainer');
  const tbody = document.getElementById('summaryBody');
  
  container.innerHTML = '';
  tbody.innerHTML = '';
  
  let filtered = rawAbsenData.filter(row => row['Minggu Kontrak'] === selectedWeek);
  
  if(searchQuery !== '') {
    filtered = filtered.filter(row => row['Nama Anggota'] && row['Nama Anggota'].toLowerCase().includes(searchQuery));
  }
  
  const grouped = {};
  filtered.forEach(row => {
    const name = row['Nama Anggota'];
    if(!name) return;
    if(!grouped[name]) {
      grouped[name] = { name: name, days: {} };
    }
    grouped[name].days[row['Hari']] = {
      startTime: row['Jam Masuk'],
      endTime: row['Jam Keluar'],
      treatment: parseInt(row['Treatment']) || 0,
      pingsan: parseInt(row['Pingsan']) || 0,
      alprazolam: parseInt(row['Alprazolam']) || 0
    };
  });

  const names = Object.keys(grouped);
  if (names.length === 0) {
    container.innerHTML = '<div style="text-align:center; color:var(--muted); padding:30px; background:var(--surface); border-radius:14px; border:1px solid var(--border);">Tidak ada record absen minggu ini.</div>';
    if(mainChart) mainChart.destroy();
    return;
  }

  let chartLabels = [], chartIncomes = [];
  const HARI_URUTAN = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];

  names.forEach(name => {
    const member = grouped[name];
    let tHours = 0, tTreat = 0, tPing = 0, tAlpra = 0;
    let daysHtml = '';

    HARI_URUTAN.forEach(h => {
      const d = member.days[h] || { startTime: '', endTime: '', treatment: 0, pingsan: 0, alprazolam: 0 };
      
      if(d.startTime && d.endTime) {
        const [sH, sM] = d.startTime.split(':').map(Number);
        const [eH, eM] = d.endTime.split(':').map(Number);
        let diff = (eH*60+eM) - (sH*60+sM); if(diff<0) diff+=1440;
        tHours += (diff/60);
      }
      tTreat += d.treatment; tPing += d.pingsan; tAlpra += d.alprazolam;

      daysHtml += `
        <div class="day-box">
          <div class="day-name">${h}</div>
          <div style="color:#fff; font-family:'DM Mono'; margin-bottom:3px;">${d.startTime || '—'}/${d.endTime || '—'}</div>
          <div style="color:var(--muted); font-size:0.65rem; line-height:1.2;">🟢 T:${d.treatment}<br>🔴 P:${d.pingsan}<br>💊 A:${d.alprazolam}</div>
        </div>`;
    });

    const rank = userRanks[member.name] || 'Emt';
    const rankClass = getRankClass(rank);

    const card = document.createElement('div');
    card.className = 'member-card';
    card.innerHTML = `
      <div class="member-top">
        <span>👤 ${member.name}</span>
        <span class="member-badge ${rankClass}">${rank}</span>
      </div>
      <div class="days-grid">${daysHtml}</div>`;
    container.appendChild(card);

    let income = (tTreat * rateTreatment) + (tPing * ratePingsan) + (tAlpra * rateAlprazolam);
    chartLabels.push(member.name);
    chartIncomes.push(income);

    tbody.innerHTML += `
      <tr>
        <td><strong>${member.name}</strong> <span class="member-badge ${rankClass}" style="font-size:0.65rem; padding:2px 4px;">${rank}</span></td>
        <td>${tHours.toFixed(1)} jam</td>
        <td>${tTreat} org</td>
        <td>${tPing} org</td>
        <td>${tAlpra} botol</td>
        <td style="color:var(--accent); font-weight:bold;">$${income}</td>
        <td><button class="btn-reset-mini" onclick="resetPerPersonFromCloud('${member.name}')">❌ Reset</button></td>
      </tr>`;
  });

  renderChart(chartLabels, chartIncomes);
}

function renderChart(labels, data) {
  const ctx = document.getElementById('analyticsChart').getContext('2d');
  if (mainChart) mainChart.destroy();
  mainChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{ label: 'Total Income ($)', data: data, backgroundColor: 'rgba(79, 255, 176, 0.3)', borderColor: '#4fffb0', borderWidth: 2, borderRadius: 5 }]
    },
    options: { 
      responsive: true, 
      maintainAspectRatio: false, 
      animation: false, 
      scales: { 
        y: { grid: { color: '#2a3045' }, ticks: { color: '#6b7490' } }, 
        x: { grid: { display: false }, ticks: { color: '#6b7490' } } 
      }, 
      plugins: { legend: { labels: { color: '#e8eaf0', font: { family: 'Syne' } } } } 
    }
  });
}

function exportToExcel() {
  const week = document.getElementById('weekStart').value;
  const table = document.getElementById('reportTable');
  const wb = XLSX.utils.table_to_book(table, { sheet: "Rekap Absensi" });
  Xcontent.writeFile(wb, `Rekap_Absensi_EMS_Valoria_Minggu_${week}.xlsx`);
}

function exportToPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const week = document.getElementById('weekStart').value;
  
  doc.setFont("Helvetica", "bold");
  doc.text("LAPORAN REKAPITULASI JABATAN & INCOME EMS VALORIA", 14, 15);
  doc.setFontSize(10);
  doc.setFont("Helvetica", "normal");
  doc.text(`Periode Kontrak Minggu: ${week}`, 14, 22);
  
  doc.autoTable({
    html: '#reportTable',
    startY: 28,
    theme: 'striped',
    headStyles: { fillColor: [22, 26, 35] },
    styles: { fontSize: 8 }
  });
  
  doc.save(`Laporan_EMS_Valoria_Minggu_${week}.pdf`);
}
</script>
</body>
</html>
